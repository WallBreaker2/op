name: Wheels

on:
  push:
    tags:
      - '[0-9]*'
      - 'v*'
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout op
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python for dependency bootstrap
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64

      - name: Cache bootstrapped dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: op-deps-${{ runner.os }}-both-${{ hashFiles('build.py', 'CMakeLists.txt', 'libop/CMakeLists.txt', 'ci/triplets/*.cmake') }}
          restore-keys: |
            op-deps-${{ runner.os }}-both-
            op-deps-${{ runner.os }}-x64-
            op-deps-${{ runner.os }}-x86-

      - name: Bootstrap native dependencies
        shell: pwsh
        run: ./scripts/cibw_before_all.ps1

      - name: Build AMD64 wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_BUILD_WINDOWS: powershell ./scripts/cibw_before_build.ps1
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_GENERATOR="Visual Studio 17 2022"
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ github.ref_type == 'tag' && github.ref_name || '0.0.0.dev0' }}"
            CMAKE_ARGS="-A x64 -DOP_PYTHON_WHEEL=ON -DOP_BUILD_TESTS=OFF -Dbuild_swig_py=ON"

      - name: Build x86 wheels
        uses: pypa/cibuildwheel@v2.23.4
        env:
          CIBW_ARCHS_WINDOWS: x86
          CIBW_BEFORE_BUILD_WINDOWS: powershell ./scripts/cibw_before_build.ps1
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_GENERATOR="Visual Studio 17 2022"
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ github.ref_type == 'tag' && github.ref_name || '0.0.0.dev0' }}"
            CMAKE_ARGS="-A Win32 -DOP_PYTHON_WHEEL=ON -DOP_BUILD_TESTS=OFF -Dbuild_swig_py=ON"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: op-plugins-wheels-${{ github.ref_name }}
          path: wheelhouse/*.whl

      - name: Attach wheels to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: wheelhouse/*.whl
          fail_on_unmatched_files: false

  pypi-publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: op-plugins-wheels-${{ github.ref_name }}
          path: dist/

      - name: Check PyPI version
        id: pypi_version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          version = os.environ["GITHUB_REF_NAME"]
          if version.startswith("v"):
              version = version[1:]

          url = f"https://pypi.org/pypi/op-plugins/{version}/json"
          exists = "false"
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  if response.status == 200:
                      exists = "true"
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={exists}\n")
          print(f"op-plugins {version} exists on PyPI: {exists}")
          PY

      - name: Publish to PyPI
        if: steps.pypi_version.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
