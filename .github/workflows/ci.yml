name: CI

on:
  push:
    branches: [ master, main ]
    tags:
      - '[0-9]*'
      - 'v*'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build-and-test:
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        arch: [ x86, x64 ]

    steps:
      - name: Checkout op
        uses: actions/checkout@v4

      - name: Set up Python for SWIG (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.arch }}

      - name: Export Python root for SWIG (${{ matrix.arch }})
        shell: pwsh
        run: |
          $pythonRoot = Split-Path (Get-Command python).Source -Parent
          if ('${{ matrix.arch }}' -eq 'x86') {
            Add-Content -Path $Env:GITHUB_ENV -Value "PYTHON32_ROOT=$pythonRoot"
          } else {
            Add-Content -Path $Env:GITHUB_ENV -Value "PYTHON64_ROOT=$pythonRoot"
          }

      - name: Cache bootstrapped dependencies (${{ matrix.arch }})
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: op-deps-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('build.py', 'CMakeLists.txt', 'libop/CMakeLists.txt', 'tests/CMakeLists.txt', 'ci/triplets/*.cmake') }}
          restore-keys: |
            op-deps-${{ runner.os }}-${{ matrix.arch }}-

      - name: Build op via build.py (${{ matrix.arch }})
        shell: pwsh
        run: |
          python build.py -g vs2026 -t Release -a ${{ matrix.arch }} --deps-arch ${{ matrix.arch }}

      - name: Run ctest (${{ matrix.arch }})
        shell: pwsh
        run: |
          $bld = "build\vs2026-${{ matrix.arch }}-Release"
          $env:OP_SKIP_OCR_TESTS = "1"
          cd $bld
          ctest -C Release --output-on-failure

  release:
    runs-on: windows-2025-vs2026
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout op
        uses: actions/checkout@v4

      - name: Set up Python x64 for SWIG
        id: setup-python-x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x64

      - name: Set up Python x86 for SWIG
        id: setup-python-x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: x86

      - name: Export Python roots for SWIG
        shell: pwsh
        run: |
          $python64Root = Split-Path "${{ steps.setup-python-x64.outputs.python-path }}" -Parent
          $python32Root = Split-Path "${{ steps.setup-python-x86.outputs.python-path }}" -Parent
          Add-Content -Path $Env:GITHUB_ENV -Value "PYTHON64_ROOT=$python64Root"
          Add-Content -Path $Env:GITHUB_ENV -Value "PYTHON32_ROOT=$python32Root"

      - name: Cache bootstrapped dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: op-deps-${{ runner.os }}-both-${{ hashFiles('build.py', 'CMakeLists.txt', 'libop/CMakeLists.txt', 'tests/CMakeLists.txt', 'ci/triplets/*.cmake') }}
          restore-keys: |
            op-deps-${{ runner.os }}-both-
            op-deps-${{ runner.os }}-x64-
            op-deps-${{ runner.os }}-x86-

      - name: Build op for x86 and x64 via build.py
        shell: pwsh
        run: |
          python build.py -g vs2026 -t Release -a x64 --deps-arch both
          python build.py -g vs2026 -t Release -a x86 --deps-arch both

      - name: Build Python wheel
        shell: pwsh
        run: |
          foreach ($arch in @('x86', 'x64')) {
            $dll = "bin\$arch\op_c_api_$arch.dll"
            if (-not (Test-Path $dll)) {
              Write-Error "Required Python package DLL not found: $dll"
            }

            $targetDir = "bindings\python\op\bin\$arch"
            New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
            Copy-Item $dll $targetDir
          }

          $python = "${{ steps.setup-python-x64.outputs.python-path }}"
          & $python -m pip install --upgrade build
          Push-Location .\bindings\python
          try {
            & $python -m build --wheel --outdir ..\..\dist .
          } finally {
            Pop-Location
          }

      - name: Package artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          foreach ($arch in @('x86', 'x64')) {
            $sourceDir = "bin\$arch"
            if (-not (Test-Path $sourceDir)) {
              Write-Error "Release source directory not found: $sourceDir"
            }

            $stageDir = "package\$arch"
            if (Test-Path $stageDir) {
              Remove-Item -Recurse -Force $stageDir
            }
            New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
            New-Item -ItemType Directory -Path "$stageDir\lib" -Force | Out-Null

            foreach ($name in @("op_$arch.dll", "op_c_api_$arch.dll", "tools.dll", "_pyop.pyd", "pyop.py")) {
              $file = Join-Path $sourceDir $name
              if (-not (Test-Path $file)) {
                Write-Error "Required release artifact not found: $file"
              }
              Copy-Item $file $stageDir
            }

            $importLib = "lib\$arch\op_c_api_$arch.lib"
            if (-not (Test-Path $importLib)) {
              Write-Error "Required C API import library not found: $importLib"
            }
            Copy-Item $importLib "$stageDir\lib"

            if (-not (Get-ChildItem $stageDir -ErrorAction SilentlyContinue)) {
              Write-Error "No release artifacts were collected for $arch"
            }

            Compress-Archive -Path "$stageDir\*" -DestinationPath "op-$tag-$arch.zip" -Force
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: op-${{ github.ref_name }}
          path: |
            op-${{ github.ref_name }}-x86.zip
            op-${{ github.ref_name }}-x64.zip
            dist/*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            op-${{ github.ref_name }}-x86.zip
            op-${{ github.ref_name }}-x64.zip
            dist/*.whl
          generate_release_notes: true
